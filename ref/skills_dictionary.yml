# Canonical skill -> {category, aliases}. Normalization (pipeline/transform/normalize.py):
#   - maps each structured skill tag (skills_raw) to a canonical name via aliases (lowercased),
#   - extracts skills from the JD free-text using aliases of length >= 3 (word-boundary),
#   - drops tokens not in this dict and LOGS them (data/quality/unmapped_skills.csv) for growth.
# Bilingual EN/VI aliases because VNW/CareerViet JDs are heavily Vietnamese.
# `category` groups skills for the report (skill-family analysis).
version: 1

skills:
  # ---- Programming languages ----
  Python: {category: language, aliases: [python, py, python3]}
  SQL: {category: language, aliases: [sql, t-sql, pl/sql, ansi sql, "câu lệnh sql"]}
  R: {category: language, aliases: [" r ", "ngôn ngữ r"]}   # short alias -> tags only (len<3 skips JD scan)
  Java: {category: language, aliases: [java]}
  Scala: {category: language, aliases: [scala]}
  Go: {category: language, aliases: [golang]}
  JavaScript: {category: language, aliases: [javascript, js, nodejs, node.js]}
  "C#": {category: language, aliases: ["c#", ".net", dotnet]}
  "C++": {category: language, aliases: ["c++"]}
  Bash: {category: language, aliases: [bash, shell script, shell scripting]}

  # ---- Databases ----
  PostgreSQL: {category: database, aliases: [postgresql, postgres]}
  MySQL: {category: database, aliases: [mysql]}
  "SQL Server": {category: database, aliases: [sql server, mssql, "microsoft sql server"]}
  Oracle: {category: database, aliases: [oracle, "oracle database"]}
  MongoDB: {category: database, aliases: [mongodb, mongo]}
  Redis: {category: database, aliases: [redis]}
  Elasticsearch: {category: database, aliases: [elasticsearch, elastic search, elk]}
  Cassandra: {category: database, aliases: [cassandra]}
